name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 仓库中已有 index.html 则直接使用；否则从 ai-industry-chain.html 复制。
      - name: Prepare index.html
        run: |
          if [ -f ai-industry-chain.html ]; then
            cp ai-industry-chain.html index.html
          elif [ ! -f index.html ]; then
            echo "Error: Neither ai-industry-chain.html nor index.html found!" >&2
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
