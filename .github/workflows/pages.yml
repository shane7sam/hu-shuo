name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GitHub Pages 以 index.html 为入口；本项目仪表盘是 ai-industry-chain.html，
      # 复制为 index.html 供 Pages 根路径直接访问（不污染仓库，仅 CI 内临时生成）。
      - name: Prepare index.html
        run: cp ai-industry-chain.html index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
